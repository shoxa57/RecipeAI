<section class="container" style="margin-top: 50px; margin-bottom: 100px;">
    <div class="weather-interactive-card">
        <div class="weather-card-inner">
            <h2 class="section-title" style="font-family: 'Orbitron'; font-size: 1.5rem;">
                PROJECT: <span class="highlight">RECIPE AI ASSISTANT</span>
            </h2>
            
            <div class="ai-glass-card">
                <div class="ai-preview-wrapper">
                    <img id="recipe-preview" style="display: none;">
                    <div id="recipe-placeholder" style="text-align: center; opacity: 0.5;">
                        <i class="fas fa-utensils fa-3x"></i>
                        <p style="margin-top: 10px; font-family: 'Orbitron'; font-size: 0.8rem;">SHOW INGREDIENTS...</p>
                    </div>
                </div>

                <div style="display: flex; gap: 10px; justify-content: center;">
                    <input type="file" id="recipe-upload-input" accept="image/*" hidden>
                    <button class="btn btn-primary" onclick="document.getElementById('recipe-upload-input').click()">
                        <i class="fas fa-camera"></i> UPLOAD PHOTO
                    </button>
                </div>

                <div id="recipe-result-box" class="ai-output-content" style="display: none;">
                    <div id="recipe-output"></div>
                </div>
            </div>
        </div>
    </div>
</section>
